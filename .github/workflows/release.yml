name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true

          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (native)
        if: '!matrix.cross'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN=reptr
          TARGET=${{ matrix.target }}
          VERSION=${GITHUB_REF_NAME}
          ARCHIVE="${BIN}-${VERSION}-${TARGET}.tar.gz"
          cp "target/${TARGET}/release/${BIN}" "${BIN}"
          tar czf "${ARCHIVE}" "${BIN}" README.md LICENSE-MIT LICENSE-APACHE
          echo "ASSET=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $BIN = "reptr"
          $TARGET = "${{ matrix.target }}"
          $VERSION = "$env:GITHUB_REF_NAME"
          $ARCHIVE = "${BIN}-${VERSION}-${TARGET}.zip"
          Copy-Item "target/${TARGET}/release/${BIN}.exe" "${BIN}.exe"
          Compress-Archive -Path "${BIN}.exe","README.md","LICENSE-MIT","LICENSE-APACHE" -DestinationPath $ARCHIVE
          "ASSET=$ARCHIVE" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Extract changelog entry
        id: changelog
        run: |
          # Pull the [Unreleased] or matching version block from CHANGELOG.md
          awk '/^## \[Unreleased\]/{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md \
            | sed '/^[[:space:]]*$/{ 1d; }' \
            > release_notes.txt
          echo "Release notes:"
          cat release_notes.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          files: |
            artifacts/*
